name: TransmissionRemote
options:
  bundleIdPrefix: com.nickvance
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "2026.06.30.1"
    CURRENT_PROJECT_VERSION: "2026.06.30.1"
    DEVELOPMENT_TEAM: 3D9SMH4RWM

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.0.0

targets:
  TransmissionRemote:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_NAME: "Transmission Remote"
        PRODUCT_BUNDLE_IDENTIFIER: com.nickvance.transmission-remote-mac
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Info.plist
        # Asset-catalog app icon (the Dock tile renders blank from an .icns-only
        # bundle on macOS 15). Keep CFBundleIconFile for Finder/.icns consumers.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconFile: AppIcon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        SWIFT_STRICT_CONCURRENCY: complete
        # We use an explicit main.swift entry point; the Xcode "debug dylib"
        # split assumes an @main type and breaks the link, so disable it.
        ENABLE_DEBUG_DYLIB: NO
      configs:
        Debug:
          # Local dev: ad-hoc sign so `xcodebuild` and Run-from-Xcode work
          # without provisioning profiles. Unsandboxed (network + local file access).
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
          ENABLE_HARDENED_RUNTIME: NO
        Release:
          # Distributable builds: signed with the Developer ID Application
          # identity + notarized (see scripts/release.sh, docs/RELEASING.md).
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          ENABLE_HARDENED_RUNTIME: YES
          CODE_SIGN_ENTITLEMENTS: Resources/TransmissionRemote.entitlements
          OTHER_CODE_SIGN_FLAGS: "--timestamp"

  # Logic unit tests. Rather than host the application (which would launch the
  # real app and connect to the owner's server), the pure/business-logic source
  # files are compiled directly into the test bundle, so tests run standalone via
  # `xctest` with no TEST_HOST.
  TransmissionRemoteTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: Sources/FuzzyMatch.swift
      - path: Sources/Formatters.swift
      - path: Sources/Filtering.swift
      - path: Sources/Models.swift
      - path: Sources/AppConfig.swift
      - path: Sources/TransmissionClient.swift
      - path: Sources/ConnectionDiagnostics.swift
      - path: Sources/SettingsEditor.swift
      - path: Sources/HostCandidates.swift
      - path: Sources/PathMapping.swift
      - path: Sources/InfoGridView.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nickvance.transmission-remote-mac.tests
        GENERATE_INFOPLIST_FILE: YES
        # Custom plist adds an ATS exception so the env-gated live connection
        # tests can reach plain-HTTP hosts by name (as the app does).
        INFOPLIST_FILE: TestsInfo.plist
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"

schemes:
  TransmissionRemote:
    build:
      targets:
        TransmissionRemote: all
        TransmissionRemoteTests: [test]
    test:
      targets:
        - TransmissionRemoteTests
